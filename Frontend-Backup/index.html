<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheLionKing Demo</title>
  <style>
    :root {
      --bg: #f4efe4;
      --text: #231f1c;
      --muted: #6b6258;
      --panel: #fffaf0;
      --accent: #a33d1a;
      --accent-soft: #f6dfce;
      --border: #d8cfc2;
    }
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      margin: 1rem;
      background: radial-gradient(circle at top right, #f8ead2 0%, var(--bg) 42%, #efe5d4 100%);
      color: var(--text);
    }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .col {
      flex: 1 1 320px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .8rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .04);
    }
    fieldset {
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }
    .pdf-frame { width: 100%; height: 480px; border: 1px solid var(--border); border-radius: 8px; }
    pre {
      background: #f8f2e8;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem;
      overflow: auto;
      max-height: 480px;
    }
    .muted { color: var(--muted); font-size: .9rem; }
    button {
      padding: .5rem .75rem;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: transform .15s ease, opacity .2s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #fff;
      color: var(--accent);
      border-color: var(--accent);
      text-decoration: none;
      display: inline-block;
      line-height: 1.2;
    }
    .btn-secondary[aria-disabled="true"] {
      pointer-events: none;
      opacity: .5;
    }
    input[type="text"] {
      width: 100%;
      padding: .4rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fffdf9;
    }
    .preview-list { display: grid; gap: .75rem; }
    .preview-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fffdf8;
      overflow: hidden;
    }
    .preview-head {
      padding: .55rem .75rem;
      border-bottom: 1px solid var(--border);
      background: #f7efe2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      font-size: .92rem;
    }
    .badge {
      padding: .18rem .45rem;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 600;
    }
    .badge-ok { background: #d8f0dd; color: #1d6a32; }
    .badge-no { background: #f8dada; color: #8d1f1f; }
    .markdown {
      padding: .75rem .9rem;
      line-height: 1.55;
    }
    .markdown h1, .markdown h2, .markdown h3, .markdown h4 {
      margin: .75rem 0 .45rem;
      line-height: 1.3;
    }
    .markdown p { margin: .45rem 0; }
    .markdown ul { margin: .45rem 0 .45rem 1.15rem; }
    .markdown code {
      background: #f0e4d2;
      padding: .06rem .25rem;
      border-radius: 5px;
      font-family: Consolas, monospace;
    }
    .markdown pre {
      margin: .55rem 0;
      background: #efe3d0;
      border: 1px solid #dbcdb7;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
    }
  </style>
  <script>
    let lastResultClean = null;
    let lastJsonObjectUrl = null;

    async function startPreview() {
      const baseUrlInput = document.getElementById('baseUrl');
      const fileInput = document.getElementById('pdfFile');
      const statusEl = document.getElementById('status');
      const idEl = document.getElementById('processId');
      const jsonEl = document.getElementById('json');
      const pdfsEl = document.getElementById('pdfs');
      const previewEl = document.getElementById('doclingPreview');
      const continueWrapEl = document.getElementById('continueWrap');
      const downloadLink = document.getElementById('downloadJsonBtn');

      jsonEl.textContent = '';
      pdfsEl.innerHTML = '';
      previewEl.innerHTML = '';
      continueWrapEl.style.display = 'none';
      downloadLink.href = '#';
      downloadLink.download = '';
      downloadLink.setAttribute('aria-disabled', 'true');
      lastResultClean = null;
      if (lastJsonObjectUrl) {
        URL.revokeObjectURL(lastJsonObjectUrl);
        lastJsonObjectUrl = null;
      }

      const baseUrl = (baseUrlInput.value || '').replace(/\/$/, '');
      if (!fileInput.files || fileInput.files.length === 0) {
        alert('Bitte ein PDF auswählen.');
        return;
      }
      const file = fileInput.files[0];
      statusEl.textContent = 'Sende /start-preview...';
      idEl.textContent = '-';

      try {
        const startResp = await fetch(baseUrl + '/v1/start-preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/pdf' },
          body: file
        });

        if (startResp.status !== 202) {
          const text = await startResp.text();
          statusEl.textContent = 'Fehler bei /start-preview: ' + startResp.status + ' ' + startResp.statusText;
          jsonEl.textContent = text;
          return;
        }
        const startJson = await startResp.json();
        const id = startJson.id || startJson;
        idEl.textContent = id;
        statusEl.textContent = 'Docling-Preview gestartet. Warte auf Vorschau...';
        pollPreview(baseUrl, id);
      } catch (e) {
        statusEl.textContent = 'Fehler: ' + (e && e.message ? e.message : e);
      }
    }

    async function pollPreview(baseUrl, id) {
      const statusEl = document.getElementById('status');
      const jsonEl = document.getElementById('json');
      const previewEl = document.getElementById('doclingPreview');
      const continueWrapEl = document.getElementById('continueWrap');

      async function once() {
        try {
          const resp = await fetch(baseUrl + '/v1/preview/' + encodeURIComponent(id), {
            headers: { 'Accept': 'application/json' }
          });
          if (resp.status === 202) {
            let progressText = '';
            try {
              const p = await resp.json();
              if (p && typeof p.progress === 'number') progressText = ' (' + p.progress + '%)';
            } catch {}
            statusEl.textContent = 'Docling läuft' + progressText + '...';
            setTimeout(once, 2000);
            return;
          }
          if (!resp.ok) {
            const text = await resp.text();
            statusEl.textContent = 'Fehler bei /preview: ' + resp.status + ' ' + resp.statusText;
            jsonEl.textContent = text;
            return;
          }
          const preview = await resp.json();
          renderPreview(preview);
          continueWrapEl.style.display = 'block';
          statusEl.textContent = 'Docling-Vorschau fertig. Jetzt LLM-Verarbeitung starten.';
        } catch (e) {
          statusEl.textContent = 'Fehler: ' + (e && e.message ? e.message : e);
        }
      }
      once();
    }

    function renderPreview(preview) {
      const previewEl = document.getElementById('doclingPreview');
      const pages = (preview && Array.isArray(preview.pages)) ? preview.pages : [];
      previewEl.innerHTML = '';
      if (pages.length === 0) {
        previewEl.innerHTML = '<div class="muted">Keine Vorschau-Seiten vorhanden.</div>';
        return;
      }

      const list = document.createElement('div');
      list.className = 'preview-list';

      pages.forEach(p => {
        const card = document.createElement('section');
        card.className = 'preview-card';

        const head = document.createElement('div');
        head.className = 'preview-head';
        const left = document.createElement('strong');
        left.textContent = 'Seite ' + ((typeof p.pageIndex === 'number') ? (p.pageIndex + 1) : '?');
        const badge = document.createElement('span');
        badge.className = 'badge ' + (p.usable ? 'badge-ok' : 'badge-no');
        badge.textContent = p.usable ? 'verwendbar' : 'nicht verwendbar';
        head.appendChild(left);
        head.appendChild(badge);
        card.appendChild(head);

        const body = document.createElement('article');
        body.className = 'markdown';
        body.innerHTML = markdownToHtml(p.markdown || '_Kein Markdown-Inhalt vorhanden._');
        card.appendChild(body);

        list.appendChild(card);
      });
      previewEl.appendChild(list);
    }

    function escapeHtml(text) {
      return (text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function markdownToHtml(text) {
      const escaped = escapeHtml(text);
      const codeBlocks = [];
      const withCodePlaceholders = escaped.replace(/```([\s\S]*?)```/g, (_, block) => {
        const token = '__CODEBLOCK_' + codeBlocks.length + '__';
        codeBlocks.push('<pre><code>' + block.trim() + '</code></pre>');
        return token;
      });

      const lines = withCodePlaceholders.split(/\r?\n/);
      const html = [];
      let inList = false;

      function closeList() {
        if (inList) {
          html.push('</ul>');
          inList = false;
        }
      }

      lines.forEach((line) => {
        if (!line.trim()) {
          closeList();
          return;
        }

        const heading = line.match(/^(#{1,4})\s+(.*)$/);
        if (heading) {
          closeList();
          const level = heading[1].length;
          html.push('<h' + level + '>' + inlineMarkdown(heading[2]) + '</h' + level + '>');
          return;
        }

        const list = line.match(/^[-*]\s+(.*)$/);
        if (list) {
          if (!inList) {
            html.push('<ul>');
            inList = true;
          }
          html.push('<li>' + inlineMarkdown(list[1]) + '</li>');
          return;
        }

        closeList();
        html.push('<p>' + inlineMarkdown(line) + '</p>');
      });
      closeList();

      let result = html.join('');
      codeBlocks.forEach((block, idx) => {
        result = result.replace('__CODEBLOCK_' + idx + '__', block);
      });
      return result;
    }

    function inlineMarkdown(line) {
      return line
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }

    async function startLlmProcessing() {
      const baseUrl = (document.getElementById('baseUrl').value || '').replace(/\/$/, '');
      const id = (document.getElementById('processId').textContent || '').trim();
      const statusEl = document.getElementById('status');
      const jsonEl = document.getElementById('json');
      if (!id || id === '-') {
        alert('Keine Prozess-ID vorhanden.');
        return;
      }
      const proceed = window.confirm('Docling-Vorschau wurde angezeigt. Soll jetzt die LLM-Verarbeitung gestartet werden?');
      if (!proceed) return;

      statusEl.textContent = 'Starte LLM-Verarbeitung...';
      try {
        const resp = await fetch(baseUrl + '/v1/continue/' + encodeURIComponent(id), { method: 'POST' });
        if (!resp.ok && resp.status !== 202) {
          const text = await resp.text();
          statusEl.textContent = 'Fehler bei /continue: ' + resp.status + ' ' + resp.statusText;
          jsonEl.textContent = text;
          return;
        }
        statusEl.textContent = 'LLM-Verarbeitung gestartet. Warte auf Ergebnis...';
        pollResult(baseUrl, id);
      } catch (e) {
        statusEl.textContent = 'Fehler: ' + (e && e.message ? e.message : e);
      }
    }

    async function pollResult(baseUrl, id) {
      const statusEl = document.getElementById('status');
      const jsonEl = document.getElementById('json');
      const pdfsEl = document.getElementById('pdfs');
      let retryMs = 3000;

      async function once() {
        try {
          const resp = await fetch(baseUrl + '/v1/result/' + encodeURIComponent(id), {
            headers: { 'Accept': 'application/json' }
          });
          if (resp.status === 202) {
            // Progress only; body may be empty depending on backend wiring
            let progressText = '';
            try {
              const p = await resp.json();
              if (p && typeof p.progress === 'number') progressText = ' (' + p.progress + '%)';
            } catch {}
            statusEl.textContent = 'Noch in Arbeit' + progressText + '...';
            const ra = resp.headers.get('Retry-After');
            const n = parseInt(ra, 10);
            setTimeout(once, isFinite(n) ? n * 1000 : retryMs);
            return;
          }
          if (resp.ok) {
            const result = await resp.json();
            statusEl.textContent = 'Fertig.';
            renderResult(result);
            return;
          }
          // Error with body
          const text = await resp.text();
          statusEl.textContent = 'Fehler bei /result: ' + resp.status + ' ' + resp.statusText;
          jsonEl.textContent = text;
        } catch (e) {
          statusEl.textContent = 'Fehler: ' + (e && e.message ? e.message : e);
        }
      }
      once();
    }

    function renderResult(result) {
      const jsonEl = document.getElementById('json');
      const pdfsEl = document.getElementById('pdfs');
      const downloadLink = document.getElementById('downloadJsonBtn');
      // Clone and strip binary to keep JSON readable
      const clean = JSON.parse(JSON.stringify(result || {}));
      if (Array.isArray(clean.documents)) {
        clean.documents.forEach(d => { if (d && d.documentData) d.documentData = '<omitted base64 pdf>'; });
      }
      jsonEl.textContent = JSON.stringify(clean, null, 2);
      lastResultClean = clean;
      if (lastJsonObjectUrl) URL.revokeObjectURL(lastJsonObjectUrl);
      const id = (document.getElementById('processId').textContent || 'result').trim();
      const fileName = 'lionking-result-' + (id || 'result') + '.json';
      const json = JSON.stringify(lastResultClean, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      lastJsonObjectUrl = URL.createObjectURL(blob);
      downloadLink.href = lastJsonObjectUrl;
      downloadLink.download = fileName;
      downloadLink.setAttribute('aria-disabled', 'false');

      // Visualize each document and show its JSON (without binary)
      const docs = (result && Array.isArray(result.documents)) ? result.documents : [];
      pdfsEl.innerHTML = '';
      docs.forEach((d, idx) => {
        const box = document.createElement('div');
        box.className = 'col';
        const title = document.createElement('div');
        title.className = 'muted';
        title.textContent = 'Dokument #' + (idx + 1) + (d && d.category ? ' (' + d.category + ')' : '');
        box.appendChild(title);
        if (d && d.documentData) {
          const url = 'data:application/pdf;base64,' + d.documentData;
          const iframe = document.createElement('iframe');
          iframe.className = 'pdf-frame';
          iframe.src = url;
          box.appendChild(iframe);
        }
        // Show per-document JSON mapping (no binary)
        const docClean = JSON.parse(JSON.stringify(d || {}));
        if (docClean.documentData) docClean.documentData = '<omitted base64 pdf>';
        const pre = document.createElement('pre');
        pre.textContent = JSON.stringify(docClean, null, 2);
        box.appendChild(pre);
        pdfsEl.appendChild(box);
      });
    }

    async function fetchExisting() {
      const baseUrl = (document.getElementById('baseUrl').value || '').replace(/\/$/, '');
      const idInput = document.getElementById('existingId');
      const id = (idInput.value || '').trim();
      const statusEl = document.getElementById('status');
      const idEl = document.getElementById('processId');
      if (!id) { alert('Bitte eine Prozess-ID eingeben.'); return; }
      idEl.textContent = id;
      statusEl.textContent = 'Hole Ergebnis...';
      pollResult(baseUrl, id);
    }

    function setDefaultBaseUrl() {
      // Default to local backend
      document.getElementById('baseUrl').value = 'http://localhost:8181';
    }
    window.addEventListener('beforeunload', () => {
      if (lastJsonObjectUrl) URL.revokeObjectURL(lastJsonObjectUrl);
    });
    window.addEventListener('DOMContentLoaded', setDefaultBaseUrl);
  </script>
</head>
<body>
  <h1>TheLionKing Frontend Demo</h1>
  <fieldset>
    <legend>Einstellungen</legend>
    <label>Backend Base URL
      <input id="baseUrl" type="text" placeholder="http://localhost:8181" />
    </label>
  </fieldset>
  <fieldset>
    <legend>PDF hochladen und Docling-Vorschau starten</legend>
    <input id="pdfFile" type="file" accept="application/pdf" />
    <button onclick="startPreview()">Docling-Vorschau starten</button>
    <div id="continueWrap" style="display:none; margin-top:.5rem;">
      <button onclick="startLlmProcessing()">LLM-Verarbeitung jetzt starten</button>
    </div>
    <div id="status" class="muted">Bereit.</div>
    <div class="muted">Process ID: <span id="processId">-</span></div>
  </fieldset>

  <fieldset>
    <legend>Vorhandene Prozess-ID abrufen</legend>
    <input id="existingId" type="text" placeholder="Prozess-ID" />
    <button onclick="fetchExisting()">Ergebnis abrufen</button>
  </fieldset>

  <div class="row">
    <div class="col">
      <h3>Docling Vorschau</h3>
      <div id="doclingPreview"></div>
    </div>
    <div class="col">
      <div class="card-head">
        <h3>Result JSON</h3>
        <a id="downloadJsonBtn" class="btn-secondary" href="#" aria-disabled="true">JSON herunterladen</a>
      </div>
      <pre id="json"></pre>
    </div>
    <div class="col" style="flex:2 1 480px">
      <h3>Erkannte PDFs</h3>
      <div id="pdfs" class="row"></div>
    </div>
  </div>
</body>
</html>
